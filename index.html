<!--
ENG.lish — Adaptive Certification Examination
500 Dynamic Questions System
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENG.lish Certification Examination</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b1020;
font-family:Arial,sans-serif;
color:white;
padding:30px;
}

.container{
max-width:950px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:40px;
}

.logo{
font-size:52px;
font-weight:900;
letter-spacing:5px;
}

.sub{
margin-top:10px;
color:#94a3b8;
font-size:14px;
letter-spacing:2px;
}

.exam{
background:#111827;
padding:40px;
border-radius:28px;
border:1px solid #1f2937;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:30px;
color:#94a3b8;
font-size:14px;
}

.question{
font-size:28px;
line-height:1.6;
margin-bottom:30px;
}

.option{
background:#1e293b;
padding:18px;
border-radius:18px;
margin-bottom:15px;
border:1px solid #334155;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#263548;
}

.option.selected{
background:#172554;
border:2px solid #60a5fa;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:white;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

button:hover{
opacity:0.92;
}

#result{
display:none;
text-align:center;
}

.level{
font-size:70px;
font-weight:bold;
margin:25px 0;
}

.pass{
color:#4ade80;
font-size:20px;
margin-top:10px;
}

.fail{
color:#f87171;
font-size:20px;
margin-top:10px;
}

.certificate{
margin-top:40px;
padding:35px;
border-radius:24px;
background:#0f172a;
border:1px solid #334155;
}

.certificate-title{
font-size:34px;
margin-bottom:20px;
letter-spacing:3px;
}

.cert-level{
font-size:60px;
font-weight:bold;
margin:20px 0;
}

.small{
margin-top:15px;
color:#94a3b8;
}

</style>
</head>
<body>

<div class="container">

<div class="header">

<div class="logo">
ENG.lish
</div>

<div class="sub">
GLOBAL ENGLISH CERTIFICATION EXAMINATION
</div>

</div>

<div class="exam">

<div id="examArea">

<div class="topbar">

<div id="progress">
Question 1 / 500
</div>

<div id="difficulty">
A1 LEVEL
</div>

</div>

<div class="question" id="question"></div>

<div id="options"></div>

<button onclick="nextQuestion()">
Continue Examination
</button>

</div>

<div id="result"></div>

</div>

</div>

<script>

/*
=========================================
500 RANDOMIZED QUESTION ENGINE
=========================================
Page refresh = completely different exam
Easy -> Medium -> Hard progression
A1 -> A2 -> B1 -> B2 -> C1 -> C2
=========================================
*/

const A1 = [
{
q:"She ___ my friend.",
a:["am","is","are","be"],
c:1
},
{
q:"I ___ football every weekend.",
a:["play","plays","playing","played"],
c:0
},
{
q:"They ___ in London.",
a:["live","lives","living","lived"],
c:0
}
];

const A2 = [
{
q:"Yesterday we ___ to school.",
a:["go","went","gone","going"],
c:1
},
{
q:"There isn't ___ milk left.",
a:["many","any","some","much"],
c:1
},
{
q:"I have lived here ___ 2020.",
a:["for","since","at","in"],
c:1
}
];

const B1 = [
{
q:"If I had money, I ___ travel.",
a:["will","would","am","can"],
c:1
},
{
q:"She enjoys ___ books.",
a:["read","reading","reads","reader"],
c:1
},
{
q:"The movie was really ___.",
a:["interest","interesting","interested","interests"],
c:1
}
];

const B2 = [
{
q:"Hardly had I arrived ___ it started raining.",
a:["than","when","after","before"],
c:1
},
{
q:"The project ___ before the deadline.",
a:["completed","had completed","had been completed","complete"],
c:2
},
{
q:"Neither John nor Mike ___ coming.",
a:["is","are","were","be"],
c:0
}
];

const C1 = [
{
q:"Rarely ___ such an impressive performance.",
a:["I witnessed","did I witness","I witness","witnessed I"],
c:1
},
{
q:"The manager insisted that the contract ___ immediately.",
a:["sign","signed","be signed","signing"],
c:2
},
{
q:"Were I in your position, I ___ the offer.",
a:["accept","would accept","accepted","am accepting"],
c:1
}
];

const C2 = [
{
q:"Scarcely had they arrived ___ the lights went out.",
a:["before","after","when","than"],
c:2
},
{
q:"No sooner had he spoken ___ everyone applauded.",
a:["when","than","after","before"],
c:1
},
{
q:"Seldom ___ such remarkable eloquence.",
a:["I heard","did I hear","heard I","I have hear"],
c:1
}
];

function randomFrom(arr){

return arr[
Math.floor(Math.random()*arr.length)
];

}

const questions = [];

// 500 SORU OLUŞTUR

for(let i=0;i<500;i++){

if(i < 80){

questions.push({
...randomFrom(A1),
level:"A1"
});

}
else if(i < 160){

questions.push({
...randomFrom(A2),
level:"A2"
});

}
else if(i < 260){

questions.push({
...randomFrom(B1),
level:"B1"
});

}
else if(i < 360){

questions.push({
...randomFrom(B2),
level:"B2"
});

}
else if(i < 440){

questions.push({
...randomFrom(C1),
level:"C1"
});

}
else{

questions.push({
...randomFrom(C2),
level:"C2"
});

}

}

let current = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let selected = null;

function loadQuestion(){

selected = null;

const q = questions[current];

document.getElementById("progress")
.innerHTML =
`Question ${current+1} / 500`;

document.getElementById("difficulty")
.innerHTML =
`${q.level} LEVEL`;

document.getElementById("question")
.innerHTML =
q.q;

const options =
document.getElementById("options");

options.innerHTML = "";

q.a.forEach((option,index)=>{

const div =
document.createElement("div");

div.className = "option";

div.innerHTML =
String.fromCharCode(65+index)
+") "+option;

div.onclick = ()=>{

document.querySelectorAll(".option")
.forEach(x=>x.classList.remove("selected"));

div.classList.add("selected");

selected = index;

};

options.appendChild(div);

});

}

function nextQuestion(){

if(selected !== null){

if(selected === questions[current].c){

score++;
correct++;

}
else{

wrong++;

}

}

current++;

if(current >= questions.length){

finishExam();
return;

}

loadQuestion();

}

function finishExam(){

let level = "";

if(score <= 100){
level = "A1";
}
else if(score <= 180){
level = "A2";
}
else if(score <= 260){
level = "B1";
}
else if(score <= 340){
level = "B2";
}
else if(score <= 430){
level = "C1";
}
else{
level = "C2";
}

const passed =
score >= 250;

document.getElementById("examArea")
.style.display="none";

document.getElementById("result")
.style.display="block";

document.getElementById("result")
.innerHTML =

`
<h1>Examination Completed</h1>

<div class="level">
${level}
</div>

<div class="pass">
✔ Correct Answers: ${correct}
</div>

<div class="fail">
✖ Wrong Answers: ${wrong}
</div>

<br>

${passed
? '<div class="pass">STATUS: WINNING</div>'
: '<div class="fail">STATUS: FAILED</div>'
}

<div class="certificate">

<div class="certificate-title">
CERTIFICATE OF ENGLISH PROFICIENCY
</div>

This certifies that the candidate has successfully completed the

<b>ENG.lish Global Certification Examination</b>

with an estimated CEFR level of

<div class="cert-level">
${level}
</div>

<div class="small">
Monthly Winning Certificate Award
</div>

</div>

`;

}

loadQuestion();

</script>

</body>
</html>
